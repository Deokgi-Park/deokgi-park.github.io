<a
  href="http://validator.w3.org/feed/check.cgi?url=https%3A//deokgi-park.github.io/feed.xml"
  ><img
    src="/assets/images/valid-rss-rogers.png"
    alt="[Valid RSS]"
    title="Validate my RSS feed"
/></a>
<script>
  // Fix: 커스텀 폰트 로드 후 greedy nav measureLinks() 강제 재실행
  // 폰트 로드 전에 너비 측정이 완료되면 breakWidths가 잘못 계산되어 About 등이 사라지는 문제 수정
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () {
      if (!document.querySelector("nav.greedy-nav")) return;

      var curW = $(window).width();
      var fakeW = curW < 768 ? 900 : 500;

      var orig = $.fn.width;
      $.fn.width = function () {
        if (this[0] === window) return fakeW;
        return orig.apply(this, arguments);
      };
      $(window).trigger("resize");

      $.fn.width = orig;
      $(window).trigger("resize");
    });
  }
</script>
<!-- end custom footer snippets -->
